<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Classic</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <p class="instructions">
          Use arrow keys or WASD to move. Press space to pause. Press restart to begin again.
        </p>

        <form id="player-form" class="player-form">
          <label class="player-form__label" for="player-name">Username</label>
          <div class="player-form__row">
            <input
              id="player-name"
              class="input"
              name="playerName"
              type="text"
              maxlength="20"
              autocomplete="nickname"
              placeholder="Enter a username"
            />
            <button class="button" type="submit">Save Name</button>
          </div>
          <p id="player-message" class="helper-text">Enter a username to save high scores.</p>
        </form>

        <div class="status-row">
          <p id="status" class="status">Press any direction to start.</p>
          <button id="restart-button" class="button" type="button">Restart</button>
        </div>

        <div id="game-board" class="board" aria-label="Snake game board" role="grid"></div>

        <div class="controls" aria-label="On-screen controls">
          <button class="button control" data-direction="up" type="button">Up</button>
          <div class="controls__row">
            <button class="button control" data-direction="left" type="button">Left</button>
            <button class="button control" data-direction="down" type="button">Down</button>
            <button class="button control" data-direction="right" type="button">Right</button>
          </div>
        </div>

        <section class="leaderboard" aria-labelledby="leaderboard-title">
          <div class="leaderboard__header">
            <h2 id="leaderboard-title">Leaderboard</h2>
            <button id="refresh-scores-button" class="button button--small" type="button">
              Refresh
            </button>
          </div>
          <p id="leaderboard-message" class="helper-text">Loading scores...</p>
          <ol id="leaderboard-list" class="leaderboard__list"></ol>
        </section>
      </section>
    </main>

    <script type="module" src="./src/snake-game.mjs"></script>
  </body>
  </html>
